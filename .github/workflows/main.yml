name: Convert JSON to QM
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    - name: Install Qt tools
      run: sudo apt-get install -y qttools5-dev-tools
    - name: Run Python script
      run: python nox.py
    - name: Convert to QM
      run: lrelease multiplayer.ts -qm multiplayer_he.qm
    - name: Upload result
      uses: actions/upload-artifact@v4
      with:
        name: translation-file
        path: multiplayer_he.qm
